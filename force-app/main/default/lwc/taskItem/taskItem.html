<template>
    <div class={rowClass}>
        <div class="task-left">
            <input type="checkbox" checked={taskLog.status} class="dt-checkbox"
                   onchange={handleCheck} />
            <div class="task-info">
                <span class="task-name">{taskLog.name}</span>
                <span class="task-meta">{taskLog.category} · {taskLog.priority}</span>
            </div>
        </div>
        <div class="task-right">
            <span class="int-label">Intensity</span>
            <input type="range" min="0" max="100" value={taskLog.intensity}
                   class="dt-range" onchange={handleIntensity} />
            <span class="int-val">{taskLog.intensity}%</span>
            <span class={priorityBadgeClass}>{taskLog.priority}</span>
        </div>
    </div>
</template>
