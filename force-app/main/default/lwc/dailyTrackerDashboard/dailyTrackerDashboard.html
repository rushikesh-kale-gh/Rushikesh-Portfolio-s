<template>
  <template if:false={isLoggedIn}>
    <c-authentication-screen onloginsuccess={handleLoginSuccess} onaccountcreated={handleAccountCreated}></c-authentication-screen>
  </template>

  <template if:true={isLoggedIn}>
    <div class="dashboard-container">
      <header class="dashboard-header">
        <div class="header-content">
          <h1 class="dashboard-title">Daily Tracker</h1>
          <p class="user-greeting">Welcome, {currentUsername}!</p>
          <p class="current-date">{todayDateLabel}</p>
          <button class="btn-logout" onclick={handleLogout}>Sign Out</button>
        </div>
      </header>

      <div class="score-overview">
        <div class="score-card overall">
          <p>Overall</p>
          <p class="score-value">{dayLogScore}%</p>
        </div>
        <div class="score-card health">
          <p>Health</p>
          <p class="score-value">{healthScore}%</p>
        </div>
        <div class="score-card career">
          <p>Career</p>
          <p class="score-value">{careerScore}%</p>
        </div>
        <div class="score-card discipline">
          <p>Discipline</p>
          <p class="score-value">{disciplineScore}%</p>
        </div>
      </div>

      <div class="tabs-container">
        <div class="tabs-header">
          <button class={getTabClass('reflection')} onclick={selectTab} data-tab="reflection">📝 Reflection</button>
          <button class={getTabClass('logs')} onclick={selectTab} data-tab="logs">📊 Show Log</button>
          <button class={getTabClass('calendar')} onclick={selectTab} data-tab="calendar">📅 Calendar</button>
          <button class={getTabClass('tasks')} onclick={selectTab} data-tab="tasks">✅ Tasks</button>
          <button class={getTabClass('habits')} onclick={selectTab} data-tab="habits">⚙️ Habits</button>
        </div>

        <template if:true={isTabActive.reflection}>
          <div class="tab-pane">
            <h2>Today's Reflection</h2>
            <textarea class="form-textarea" value={reflectionText} onchange={updateReflectionText} placeholder="How was your day?"></textarea>
            <button class="btn btn-primary" onclick={saveReflection}>Save Reflection</button>
          </div>
        </template>

        <template if:true={isTabActive.logs}>
          <div class="tab-pane">
            <h2>Performance Analytics</h2>
            <select class="form-select" value={analyticsRange} onchange={changeAnalyticsRange}>
              <option value="day">Today</option>
              <option value="week">Last 7 Days</option>
              <option value="month">Last 30 Days</option>
            </select>
            <div class="chart-placeholder"><p>📊 Analytics Chart</p></div>
          </div>
        </template>

        <template if:true={isTabActive.calendar}>
          <div class="tab-pane">
            <h2>Performance Calendar</h2>
            <div class="calendar-controls">
              <button onclick={prevMonth}>← Prev</button>
              <span>{calendarMonthYear}</span>
              <button onclick={nextMonth}>Next →</button>
            </div>
            <div class="calendar-grid">
              <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div>
              <div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>
              <template for:each={calendarDays} for:item="day">
                <div class={getDayClass(day)} key={day.date}>{day.day}<template if:true={day.score}><small>{day.score}%</small></template></div>
              </template>
            </div>
          </div>
        </template>

        <template if:true={isTabActive.tasks}>
          <div class="tab-pane">
            <h2>Today's Tasks</h2>
            <template for:each={todayTasks} for:item="task">
              <div class="task-card" key={task.id}>
                <h4>{task.name}</h4><span class="badge">{task.category}</span>
                <p>Priority: {task.priority}</p>
                <input type="checkbox" checked={task.completed} onchange={toggleTask} data-taskid={task.id} />
                <template if:true={task.completed}>
                  <input type="range" min="0" max="100" value={task.intensity} onchange={updateIntensity} data-taskid={task.id} />
                  <span>{task.intensity}%</span>
                </template>
              </div>
            </template>
          </div>
        </template>

        <template if:true={isTabActive.habits}>
          <div class="tab-pane">
            <h2>Configure Habits</h2>
            <input type="text" value={newHabitName} onchange={updateNewHabitName} placeholder="Habit name" />
            <select value={newHabitCategory} onchange={updateNewHabitCategory}>
              <option value="">Category</option>
              <option value="Health">Health</option>
              <option value="Career">Career</option>
              <option value="Discipline">Discipline</option>
            </select>
            <select value={newHabitPriority} onchange={updateNewHabitPriority}>
              <option value="">Priority</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
              <option value="Critical">Critical</option>
            </select>
            <button class="btn btn-primary" onclick={addHabit}>Add Habit</button>
            <div class="habits-list">
              <template for:each={userHabits} for:item="habit">
                <div class="habit-item" key={habit.id}>
                  <p>{habit.name} - {habit.category}</p>
                  <button onclick={deleteHabit} data-habitid={habit.id}>Delete</button>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <template if:true={showToast}>
        <div class="toast {toastType}">{toastMessage}</div>
      </template>
    </div>
  </template>
</template>
